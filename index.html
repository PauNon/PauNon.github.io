# Hero Section Enhancement — Paste Guide

---

## 1. HTML ADDITION
**Where:** Inside `#hero`, before any existing content (first child). Add a `<canvas>` element.

```html
<canvas id="hero-canvas" aria-hidden="true"></canvas>
```

---

## 2. CSS ADDITION
**Where:** Paste into your existing `<style>` block, or in a `<style>` tag just before `</head>`.

```css
/* ── Hero Canvas Background ─────────────────────────── */
#hero {
  position: relative;
  overflow: hidden;
}

#hero-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* Ensure all direct children of #hero sit above the canvas */
#hero > *:not(#hero-canvas) {
  position: relative;
  z-index: 1;
}
```

---

## 3. JAVASCRIPT
**Where:** Paste just before `</body>` (after all existing scripts).

```js
/* ── Hero: Immersive Background & Parallax ───────────── */
(function () {
  const canvas = document.getElementById('hero-canvas');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const ACCENT = [
    { r: 127, g: 149, b: 209 }, // #7F95D1 blue-lavender
    { r: 255, g: 130, b: 128 }, // #FF8280 coral
    { r: 255, g: 218, b:  79 }, // #FFDA4F yellow
    {  r: 121, g: 235, b: 231 }, // #79EBE7 teal
  ];

  let W, H, mouse = { x: 0, y: 0 }, raf;

  /* ── Resize ── */
  function resize() {
    const hero = canvas.parentElement;
    W = canvas.width  = hero.offsetWidth;
    H = canvas.height = hero.offsetHeight;
  }

  /* ── Orbs (large soft gradient blobs) ── */
  const ORBS = Array.from({ length: 5 }, (_, i) => {
    const c = ACCENT[i % ACCENT.length];
    return {
      x: Math.random(),
      y: Math.random(),
      r: 0.25 + Math.random() * 0.2,      // radius as fraction of min(W,H)
      vx: (Math.random() - 0.5) * 0.00008,
      vy: (Math.random() - 0.5) * 0.00008,
      color: c,
      alpha: 0.04 + Math.random() * 0.05,
      phase: Math.random() * Math.PI * 2,
    };
  });

  /* ── Floating Shapes ── */
  const SHAPES = Array.from({ length: 18 }, () => {
    const c = ACCENT[Math.floor(Math.random() * ACCENT.length)];
    return {
      x: Math.random(),
      y: Math.random(),
      size: 18 + Math.random() * 40,
      vx: (Math.random() - 0.5) * 0.00015,
      vy: -0.00006 - Math.random() * 0.00010, // drift upward gently
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.002,
      type: Math.random() < 0.5 ? 'circle' : 'ring',
      color: c,
      alpha: 0.04 + Math.random() * 0.07,
    };
  });

  /* ── Grid Lines ── */
  function drawGrid() {
    const cols = 10, rows = 8;
    ctx.save();
    ctx.strokeStyle = 'rgba(127,149,209,0.03)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= cols; i++) {
      const x = (W / cols) * i;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let j = 0; j <= rows; j++) {
      const y = (H / rows) * j;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.restore();
  }

  /* ── Draw ── */
  function draw(ts) {
    ctx.clearRect(0, 0, W, H);

    /* base black fill */
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    /* subtle grid */
    drawGrid();

    const MX = mouse.x / W - 0.5; // -0.5 … 0.5
    const MY = mouse.y / H - 0.5;

    /* orbs */
    ORBS.forEach(o => {
      o.x += o.vx; o.y += o.vy;
      if (o.x < -0.3) o.x = 1.3;
      if (o.x >  1.3) o.x = -0.3;
      if (o.y < -0.3) o.y = 1.3;
      if (o.y >  1.3) o.y = -0.3;

      /* parallax offset for orbs */
      const px = o.x * W + MX * 30;
      const py = o.y * H + MY * 20;
      const radius = o.r * Math.min(W, H);

      /* breathing pulse */
      const pulse = 1 + 0.04 * Math.sin(ts * 0.0008 + o.phase);

      const grad = ctx.createRadialGradient(px, py, 0, px, py, radius * pulse);
      const { r, g, b } = o.color;
      grad.addColorStop(0, `rgba(${r},${g},${b},${o.alpha})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(px, py, radius * pulse, 0, Math.PI * 2);
      ctx.fill();
    });

    /* floating shapes */
    SHAPES.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.rot += s.vrot;
      if (s.y < -0.1) { s.y = 1.1; s.x = Math.random(); }
      if (s.x < -0.1) s.x = 1.1;
      if (s.x >  1.1) s.x = -0.1;

      const px = s.x * W + MX * 15;
      const py = s.y * H + MY * 10;
      const { r, g, b } = s.color;

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(s.rot);
      ctx.globalAlpha = s.alpha;
      ctx.strokeStyle = `rgb(${r},${g},${b})`;
      ctx.fillStyle   = `rgb(${r},${g},${b})`;
      ctx.lineWidth = 1.2;

      if (s.type === 'ring') {
        ctx.beginPath();
        ctx.arc(0, 0, s.size * 0.5, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, s.size * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    });

    raf = requestAnimationFrame(draw);
  }

  /* ── Mouse Parallax ── */
  const hero = document.getElementById('hero');
  hero.addEventListener('mousemove', e => {
    const rect = hero.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  }, { passive: true });

  hero.addEventListener('mouseleave', () => {
    /* smoothly reset to center */
    mouse.x = W * 0.5;
    mouse.y = H * 0.5;
  }, { passive: true });

  /* ── Touch support ── */
  hero.addEventListener('touchmove', e => {
    const rect = hero.getBoundingClientRect();
    const t = e.touches[0];
    mouse.x = t.clientX - rect.left;
    mouse.y = t.clientY - rect.top;
  }, { passive: true });

  /* ── Click Sound: wire to existing #click-sound ── */
  const clickSound = document.getElementById('click-sound');
  if (clickSound) {
    hero.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('click', () => {
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
      });
    });
  }

  /* ── Init ── */
  window.addEventListener('resize', resize);
  resize();
  mouse.x = W * 0.5;
  mouse.y = H * 0.5;
  raf = requestAnimationFrame(draw);
})();
```

---

## SUMMARY OF CHANGES

| Area | What was added |
|---|---|
| `#hero-canvas` | Full-bleed canvas, `z-index: 0`, `pointer-events: none` |
| CSS | `#hero { overflow: hidden }`, all children forced to `z-index: 1` |
| Canvas | Black base → subtle grid → 5 soft gradient orbs → 18 floating rings/dots |
| Parallax | Mouse position offsets orbs (+30px) and shapes (+15px) smoothly |
| Sound | `#click-sound` triggered on every `<a>` and `<button>` inside `#hero` |
| Perf | Single `requestAnimationFrame` loop, no libraries needed |
